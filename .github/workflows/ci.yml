---
name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ github.repository }} with Idris2 latest
    runs-on: ubuntu-latest
    env:
      PACK_DIR: /root/.pack
    strategy:
      fail-fast: false
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build evince
        run: pack --no-prompt install evince
      - name: Test evince
        run: pack --no-prompt test evince
      - name: Build evince-hedgehog
        run: pack --no-prompt install evince-hedgehog
      - name: Test evince-hedgehog
        run: pack --no-prompt test evince-hedgehog
